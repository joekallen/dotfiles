darwin:
  packages:
    common:
      brews:
        - carapace
        - chezmoi
        - direnv
        - docutils
        - eza
        - git
        - fzf
        - lazygit
        - mas
        - mise
        - mods
        - nushell
        - podman
        - ripgrep
        - sevenzip
        - starship
        - wget
